<svg viewBox="0 0 640 160" width="640" height="160" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, Helvetica, sans-serif" role="img" aria-label="Foreman status wall mock">
  <title>Foreman status wall</title>
  <rect x="0" y="0" width="640" height="160" fill="#F6F5F1"/>
  <text x="16" y="24" font-size="13" font-weight="700" fill="#1E4E79">Status wall</text>

  <!-- T01 done (green) -->
  <g>
    <rect x="16" y="38" width="90" height="60" rx="6" fill="#e6f7ea" stroke="#2f9e44" stroke-width="2"/>
    <rect x="16" y="38" width="6" height="60" fill="#2f9e44"/>
    <text x="61" y="64" text-anchor="middle" font-size="13" font-weight="700" fill="#1c5c30">T01</text>
    <text x="61" y="82" text-anchor="middle" font-size="10" fill="#1c5c30">done</text>
  </g>

  <!-- T02 done (green) -->
  <g>
    <rect x="116" y="38" width="90" height="60" rx="6" fill="#e6f7ea" stroke="#2f9e44" stroke-width="2"/>
    <rect x="116" y="38" width="6" height="60" fill="#2f9e44"/>
    <text x="161" y="64" text-anchor="middle" font-size="13" font-weight="700" fill="#1c5c30">T02</text>
    <text x="161" y="82" text-anchor="middle" font-size="10" fill="#1c5c30">done</text>
  </g>

  <!-- T03 in-progress (amber) -->
  <g>
    <rect x="216" y="38" width="90" height="60" rx="6" fill="#fff6dc" stroke="#d9a406" stroke-width="2"/>
    <rect x="216" y="38" width="6" height="60" fill="#d9a406"/>
    <text x="261" y="64" text-anchor="middle" font-size="13" font-weight="700" fill="#8a6604">T03</text>
    <text x="261" y="82" text-anchor="middle" font-size="10" fill="#8a6604">in progress</text>
  </g>

  <!-- T04 blocked (red) -->
  <g>
    <rect x="316" y="38" width="90" height="60" rx="6" fill="#fce8e6" stroke="#c0392b" stroke-width="2"/>
    <rect x="316" y="38" width="6" height="60" fill="#c0392b"/>
    <text x="361" y="64" text-anchor="middle" font-size="13" font-weight="700" fill="#7a2318">T04</text>
    <text x="361" y="82" text-anchor="middle" font-size="10" fill="#7a2318">blocked</text>
  </g>

  <!-- T05 pending (grey) -->
  <g>
    <rect x="416" y="38" width="90" height="60" rx="6" fill="#eceeef" stroke="#9aa2ab" stroke-width="2"/>
    <rect x="416" y="38" width="6" height="60" fill="#9aa2ab"/>
    <text x="461" y="64" text-anchor="middle" font-size="13" font-weight="700" fill="#4a5158">T05</text>
    <text x="461" y="82" text-anchor="middle" font-size="10" fill="#4a5158">pending</text>
  </g>

  <!-- T06 pending (grey) -->
  <g>
    <rect x="516" y="38" width="90" height="60" rx="6" fill="#eceeef" stroke="#9aa2ab" stroke-width="2"/>
    <rect x="516" y="38" width="6" height="60" fill="#9aa2ab"/>
    <text x="561" y="64" text-anchor="middle" font-size="13" font-weight="700" fill="#4a5158">T06</text>
    <text x="561" y="82" text-anchor="middle" font-size="10" fill="#4a5158">pending</text>
  </g>

  <!-- legend -->
  <g font-size="11" fill="#333">
    <rect x="16" y="118" width="12" height="12" fill="#2f9e44"/>
    <text x="33" y="128">done</text>
    <rect x="90" y="118" width="12" height="12" fill="#c0392b"/>
    <text x="107" y="128">blocked</text>
    <rect x="180" y="118" width="12" height="12" fill="#d9a406"/>
    <text x="197" y="128">in progress / review</text>
    <rect x="340" y="118" width="12" height="12" fill="#9aa2ab"/>
    <text x="357" y="128">pending / ready</text>
  </g>
  <text x="16" y="150" font-size="10" fill="#5a5a5a" font-style="italic">one cell per task · click a cell for criteria, attempts, and verdict history</text>
</svg>
