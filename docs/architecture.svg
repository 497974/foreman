<svg viewBox="0 0 960 640" width="960" height="640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, Helvetica, sans-serif" role="img" aria-label="Foreman architecture diagram">
  <title>Foreman architecture</title>
  <defs>
    <marker id="arrowSteel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1E4E79"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D9700A"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2E7D4F"/>
    </marker>
  </defs>

  <!-- ground -->
  <rect x="0" y="0" width="960" height="640" fill="#F6F5F1"/>

  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1E4E79">Foreman — plan / claim / execute / verify / negotiate</text>

  <!-- requirements -->
  <g>
    <rect x="20" y="80" width="140" height="56" rx="8" fill="#FFFFFF" stroke="#1E4E79" stroke-width="2"/>
    <text x="90" y="104" text-anchor="middle" font-size="14" fill="#1E4E79" font-weight="600">requirements</text>
    <text x="90" y="122" text-anchor="middle" font-size="11" fill="#3a3a3a">checklist.md</text>
  </g>
  <line x1="160" y1="108" x2="216" y2="108" stroke="#1E4E79" stroke-width="2.5" marker-end="url(#arrowSteel)"/>

  <!-- Planner -->
  <g>
    <rect x="220" y="80" width="150" height="56" rx="8" fill="#1E4E79"/>
    <text x="295" y="104" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="700">Planner</text>
    <text x="295" y="122" text-anchor="middle" font-size="11" fill="#DCE7F0">qwen-max</text>
  </g>
  <line x1="370" y1="108" x2="430" y2="108" stroke="#1E4E79" stroke-width="2.5" marker-end="url(#arrowSteel)"/>
  <line x1="430" y1="108" x2="430" y2="170" stroke="#1E4E79" stroke-width="2.5" marker-end="url(#arrowSteel)"/>

  <!-- Ledger (central) -->
  <g>
    <rect x="360" y="176" width="240" height="92" rx="10" fill="#FFFFFF" stroke="#1E4E79" stroke-width="3"/>
    <text x="480" y="202" text-anchor="middle" font-size="15" font-weight="700" fill="#1E4E79">Ledger</text>
    <text x="480" y="220" text-anchor="middle" font-size="11" fill="#3a3a3a">durable SQLite · WAL mode</text>
    <text x="480" y="236" text-anchor="middle" font-size="11" fill="#3a3a3a">tasks + append-only attempts</text>
    <text x="480" y="253" text-anchor="middle" font-size="11" font-style="italic" fill="#5a5a5a">single source of truth for --resume</text>
  </g>

  <!-- Dispatcher -->
  <g>
    <rect x="640" y="184" width="180" height="76" rx="8" fill="#FFFFFF" stroke="#1E4E79" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="730" y="208" text-anchor="middle" font-size="14" font-weight="700" fill="#1E4E79">Dispatcher</text>
    <text x="730" y="226" text-anchor="middle" font-size="11" fill="#3a3a3a">pure code · zero LLM</text>
    <text x="730" y="242" text-anchor="middle" font-size="10" fill="#5a5a5a">CAS claim + TTL lease</text>
  </g>
  <line x1="640" y1="222" x2="600" y2="222" stroke="#1E4E79" stroke-width="2.5" marker-end="url(#arrowSteel)"/>

  <!-- Executor -->
  <g>
    <rect x="740" y="300" width="180" height="70" rx="8" fill="#1E4E79"/>
    <text x="830" y="323" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="700">Executor</text>
    <text x="830" y="340" text-anchor="middle" font-size="11" fill="#DCE7F0">native | qwen-code</text>
    <text x="830" y="356" text-anchor="middle" font-size="10" fill="#c9dced">clean context per task</text>
  </g>
  <line x1="730" y1="260" x2="800" y2="300" stroke="#1E4E79" stroke-width="2.5" marker-end="url(#arrowSteel)"/>
  <text x="815" y="286" font-size="10" fill="#1E4E79">next task</text>

  <!-- Verifier -->
  <g>
    <rect x="740" y="410" width="180" height="70" rx="8" fill="#1E4E79"/>
    <text x="830" y="433" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="700">Verifier</text>
    <text x="830" y="450" text-anchor="middle" font-size="11" fill="#DCE7F0">objective test gates</text>
    <text x="830" y="466" text-anchor="middle" font-size="10" fill="#c9dced">pytest -q + LLM scoring</text>
  </g>
  <line x1="830" y1="370" x2="830" y2="410" stroke="#1E4E79" stroke-width="2.5" marker-end="url(#arrowSteel)"/>
  <text x="845" y="394" font-size="10" fill="#1E4E79">submit + handoff</text>

  <!-- reject/dispute path (orange) -->
  <g>
    <rect x="500" y="490" width="170" height="70" rx="8" fill="#FFFFFF" stroke="#D9700A" stroke-width="2.5"/>
    <text x="585" y="513" text-anchor="middle" font-size="13" font-weight="700" fill="#D9700A">dispute</text>
    <text x="585" y="530" text-anchor="middle" font-size="11" fill="#3a3a3a">executor appeals</text>
    <text x="585" y="546" text-anchor="middle" font-size="10" fill="#8a5006">one per task per run</text>
  </g>
  <line x1="740" y1="460" x2="670" y2="510" stroke="#D9700A" stroke-width="2.5" stroke-dasharray="1,0" marker-end="url(#arrowOrange)"/>
  <text x="672" y="482" font-size="10" fill="#D9700A" font-weight="600">reject (criteria only)</text>

  <g>
    <rect x="260" y="490" width="170" height="70" rx="8" fill="#D9700A"/>
    <text x="345" y="513" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Arbiter</text>
    <text x="345" y="530" text-anchor="middle" font-size="11" fill="#FCE7CF">qwen-max</text>
    <text x="345" y="546" text-anchor="middle" font-size="10" fill="#FCE7CF">reads evidence, rules</text>
  </g>
  <line x1="500" y1="525" x2="430" y2="525" stroke="#D9700A" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- arbiter back to ledger: overturn -> pass; uphold -> requeue -->
  <path d="M 260 510 C 150 460, 150 300, 360 222" fill="none" stroke="#D9700A" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowOrange)"/>
  <text x="120" y="380" font-size="10" fill="#8a5006" transform="rotate(-90 120 380)">uphold → requeue via ledger</text>

  <!-- pass path (green) -->
  <g>
    <rect x="500" y="410" width="160" height="60" rx="8" fill="#FFFFFF" stroke="#2E7D4F" stroke-width="2.5"/>
    <text x="580" y="435" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D4F">pass → DONE</text>
    <text x="580" y="452" text-anchor="middle" font-size="10" fill="#215c3b">unlock next task</text>
  </g>
  <line x1="740" y1="440" x2="660" y2="440" stroke="#2E7D4F" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <path d="M 500 430 C 420 380, 420 280, 400 268" fill="none" stroke="#2E7D4F" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="405" y="300" font-size="10" fill="#215c3b">record_verdict</text>

  <!-- overturn arrow (orange, arbiter to pass) -->
  <path d="M 345 490 C 400 460, 460 440, 500 430" fill="none" stroke="#D9700A" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowOrange)"/>
  <text x="360" y="470" font-size="10" fill="#8a5006">overturn → pass</text>

  <!-- Ledger side elements: resume + web console -->
  <g>
    <rect x="60" y="330" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#1E4E79" stroke-width="2"/>
    <text x="160" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#1E4E79">--resume RUN_ID</text>
    <text x="160" y="372" text-anchor="middle" font-size="10" fill="#3a3a3a">reopen ledger, revive BLOCKED, no re-plan</text>
  </g>
  <line x1="260" y1="360" x2="360" y2="280" stroke="#1E4E79" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowSteel)"/>

  <g>
    <rect x="60" y="410" width="200" height="70" rx="8" fill="#FFFFFF" stroke="#1E4E79" stroke-width="2"/>
    <text x="160" y="434" text-anchor="middle" font-size="13" font-weight="700" fill="#1E4E79">Local Web Console</text>
    <text x="160" y="451" text-anchor="middle" font-size="10" fill="#3a3a3a">serve.py · stdlib http.server</text>
    <text x="160" y="466" text-anchor="middle" font-size="10" fill="#3a3a3a">status wall + live event feed</text>
  </g>
  <line x1="260" y1="445" x2="360" y2="245" stroke="#1E4E79" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowSteel)"/>
  <text x="270" y="360" font-size="10" fill="#1E4E79">reads ledger.db + events.jsonl</text>

  <!-- legend -->
  <g font-size="11">
    <rect x="620" y="590" width="14" height="14" fill="#1E4E79"/>
    <text x="640" y="601" fill="#333">core pipeline</text>
    <line x1="740" y1="597" x2="768" y2="597" stroke="#D9700A" stroke-width="3"/>
    <text x="774" y="601" fill="#333">reject / dispute</text>
    <line x1="870" y1="597" x2="898" y2="597" stroke="#2E7D4F" stroke-width="3"/>
    <text x="0" y="0" fill="none"/>
  </g>
  <g font-size="11">
    <rect x="20" y="590" width="14" height="14" fill="#1E4E79"/>
    <text x="40" y="601" fill="#333">component</text>
    <line x1="150" y1="597" x2="178" y2="597" stroke="#D9700A" stroke-width="3"/>
    <text x="184" y="601" fill="#333">reject / dispute path</text>
    <line x1="330" y1="597" x2="358" y2="597" stroke="#2E7D4F" stroke-width="3"/>
    <text x="364" y="601" fill="#333">pass path</text>
  </g>
  <text x="480" y="625" text-anchor="middle" font-size="10.5" fill="#5a5a5a" font-style="italic">requirements → Planner → Ledger ⇄ Dispatcher → Executor → Verifier → (reject → dispute → Arbiter) | (pass → done → unlock next)</text>
</svg>
