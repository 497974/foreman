<title>Foreman — Local Console</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --steel: #1E4E79;
    --steel-dark: #163a5c;
    --steel-light: #4c7ba3;
    --orange: #D9700A;
    --orange-light: #f2a35c;
    --bg: #f4f2ee;
    --panel: #ffffff;
    --ink: #1c2530;
    --ink-soft: #5b6672;
    --line: #d9d4c9;

    --c-done: #2f9e44;
    --c-done-bg: #e6f7ea;
    --c-blocked: #c0392b;
    --c-blocked-bg: #fce8e6;
    --c-amber: #d9a406;
    --c-amber-bg: #fff6dc;
    --c-grey: #9aa2ab;
    --c-grey-bg: #eceeef;

    font-family: "Segoe UI", "Consolas", Tahoma, Arial, "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    height: 100%;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .tabular { font-variant-numeric: tabular-nums; font-family: Consolas, "Courier New", monospace; }

  button { font-family: inherit; }

  /* ---------- top header ---------- */
  header {
    background: var(--steel);
    color: #fff;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 3px solid var(--orange);
    flex-shrink: 0;
    position: relative;
    z-index: 60;
  }

  header .brand {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  header .brand .mark {
    display: inline-block;
    width: 12px; height: 12px;
    background: var(--orange);
    transform: rotate(45deg);
  }

  header .spacer { flex: 1; }

  header .run-id-tag {
    font-family: Consolas, monospace;
    font-size: 13px;
    background: rgba(0,0,0,0.18);
    padding: 4px 10px;
    border-radius: 4px;
  }

  header .chip {
    font-size: 11px;
    background: rgba(255,255,255,0.14);
    padding: 3px 9px;
    border-radius: 10px;
    white-space: nowrap;
  }
  header .chip.mock {
    background: var(--orange);
    font-weight: 700;
  }

  header .cost-tick {
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    background: rgba(0,0,0,0.18);
    border-radius: 4px;
    white-space: nowrap;
  }

  header .clock {
    font-size: 20px;
    font-weight: 600;
    padding: 4px 12px;
    background: rgba(0,0,0,0.18);
    border-radius: 4px;
  }

  header .run-complete-badge {
    background: var(--c-done);
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: none;
  }
  header .run-complete-badge.show { display: inline-block; }

  .lang-switch {
    display: flex;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .lang-switch button {
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 5px 10px;
    cursor: pointer;
  }
  .lang-switch button + button { border-left: 1px solid rgba(255,255,255,0.4); }
  .lang-switch button:hover { background: rgba(255,255,255,0.12); }
  .lang-switch button.active {
    background: var(--orange);
    color: #fff;
  }

  .hdr-btn {
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.08);
    color: #fff;
    border-radius: 4px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.22); }
  .hdr-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .hdr-btn.danger { border-color: var(--c-blocked); background: rgba(192,57,43,0.35); }
  .hdr-btn.danger:hover { background: rgba(192,57,43,0.55); }
  .hdr-btn.primary { background: var(--orange); border-color: var(--orange); }
  .hdr-btn.primary:hover { background: #c26308; }

  /* ---------- layout ---------- */
  .layout {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .left-panel {
    width: 320px;
    flex-shrink: 0;
    max-width: 38%;
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
  }

  .left-panel h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin: 6px 0 0 0;
  }

  .field-label {
    font-size: 11px;
    color: var(--ink-soft);
    margin: 6px 0 2px 0;
  }

  .left-panel select,
  .left-panel input[type=text] {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 12.5px;
    background: #fff;
    color: var(--ink);
  }

  .left-panel textarea {
    min-height: 130px;
    resize: vertical;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px;
    font-family: Consolas, "Courier New", monospace;
    font-size: 12.5px;
    line-height: 1.45;
    width: 100%;
  }

  .left-panel textarea:focus,
  .left-panel select:focus { outline: 2px solid var(--steel-light); }

  .model-row {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-bottom: 4px;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--ink);
    padding: 4px 0;
  }
  .checkbox-row .hint {
    color: var(--ink-soft);
    font-size: 10.5px;
    display: block;
    margin-left: 22px;
  }

  button.start-btn {
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 11px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  button.start-btn:hover { background: #c26308; }
  button.start-btn:disabled { background: var(--c-grey); cursor: not-allowed; }

  .status-line {
    font-size: 12px;
    color: var(--ink-soft);
    min-height: 16px;
  }
  .status-line.error { color: var(--c-blocked); font-weight: 600; }

  hr.sep { border: none; border-top: 1px solid var(--line); margin: 6px 0; }

  /* ---------- runs list ---------- */
  .runs-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }
  .run-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    font-size: 12px;
  }
  .run-row:hover { background: var(--bg); }
  .run-row.selected { background: var(--c-grey-bg); border-color: var(--steel-light); }
  .run-row .dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  }
  .run-row .rid {
    font-family: Consolas, monospace;
    font-weight: 700;
    color: var(--steel);
    flex-shrink: 0;
    max-width: 92px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .run-row .rtime {
    color: var(--ink-soft);
    flex-shrink: 0;
  }
  .run-row .rcost {
    color: var(--ink-soft);
    margin-left: auto;
    flex-shrink: 0;
  }
  .run-row .mock-chip {
    background: var(--orange);
    color: #fff;
    font-size: 9.5px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .runs-empty-hint {
    color: var(--ink-soft);
    font-size: 12px;
    padding: 10px 4px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .legend .sw {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .legend .dot {
    width: 10px; height: 10px; border-radius: 2px;
  }

  /* ---------- main: status wall ---------- */
  .main-panel {
    flex: 1;
    min-width: 62%;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }

  .run-header {
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .run-header .rh-id {
    font-family: Consolas, monospace;
    font-weight: 700;
    color: var(--steel);
    font-size: 13px;
  }
  .run-header .rh-chip {
    font-size: 10.5px;
    background: var(--c-grey-bg);
    color: var(--ink-soft);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .run-header .rh-chip.mock { background: var(--orange); color: #fff; font-weight: 700; }
  .run-header .rh-cost {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--steel);
  }
  .run-header .rh-clock {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .run-header .rh-spacer { flex: 1; }
  .run-header .rh-btn {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    border-radius: 4px;
    padding: 5px 11px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .run-header .rh-btn:hover { background: var(--bg); }
  .run-header .rh-btn.stop { color: var(--c-blocked); border-color: var(--c-blocked); }
  .run-header .rh-btn.resume { color: var(--c-done); border-color: var(--c-done); }
  .run-header .rh-btn.archive:hover { background: var(--c-blocked-bg); }

  /* ---------- error banner ---------- */
  .error-banner {
    display: none;
    background: var(--c-blocked-bg);
    color: #7a2318;
    border-bottom: 2px solid var(--c-blocked);
    padding: 8px 20px;
    font-size: 12.5px;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .error-banner.show { display: flex; }
  .error-banner .eb-text { flex: 1; }
  .error-banner .eb-close {
    background: none;
    border: none;
    color: #7a2318;
    font-size: 16px;
    cursor: pointer;
    font-weight: 700;
    line-height: 1;
  }

  .wall-header {
    padding: 12px 20px 6px 20px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-shrink: 0;
  }

  .wall-header h1 {
    font-size: 15px;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--steel);
  }

  .wall-header .counts {
    font-size: 12px;
    color: var(--ink-soft);
  }

  .wall {
    flex: 1;
    overflow-y: auto;
    padding: 10px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    align-content: start;
  }

  .wall.empty::after {
    content: attr(data-empty-text);
    grid-column: 1 / -1;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 30px 0;
    text-align: center;
  }

  .cell {
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    border: 1px solid transparent;
    min-height: 66px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.08s ease;
  }
  .cell:hover { transform: translateY(-1px); border-color: rgba(0,0,0,0.15); }
  .cell:active { transform: translateY(0); }

  .cell .tid {
    font-family: Consolas, "Courier New", monospace;
    font-size: 11px;
    font-weight: 700;
    opacity: 0.75;
  }
  .cell .title {
    font-size: 12.5px;
    line-height: 1.3;
    margin-top: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .cell .meta {
    font-size: 10.5px;
    margin-top: 6px;
    opacity: 0.8;
  }

  .cell.status-done { background: var(--c-done-bg); color: #1c5c30; border-left: 4px solid var(--c-done); }
  .cell.status-blocked { background: var(--c-blocked-bg); color: #7a2318; border-left: 4px solid var(--c-blocked); }
  .cell.status-in_progress,
  .cell.status-pending_review,
  .cell.status-disputing { background: var(--c-amber-bg); color: #7a5c04; border-left: 4px solid var(--c-amber); }
  .cell.status-pending,
  .cell.status-ready,
  .cell.status-archived { background: var(--c-grey-bg); color: #4a5158; border-left: 4px solid var(--c-grey); }

  .cell.selected { outline: 2px solid var(--steel); outline-offset: -2px; }

  /* ---------- event feed ---------- */
  .feed-panel {
    flex-shrink: 0;
    height: 200px;
    border-top: 2px solid var(--line);
    background: var(--panel);
    display: flex;
    flex-direction: column;
  }
  .feed-header {
    padding: 8px 20px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--steel);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .feed-header .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--c-done);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .feed-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    font-family: Consolas, "Courier New", monospace;
    font-size: 12px;
  }

  .feed-row {
    display: flex;
    gap: 10px;
    padding: 4px 20px;
    align-items: baseline;
    border-bottom: 1px solid #f0ede6;
  }
  .feed-row .ts { color: var(--ink-soft); flex-shrink: 0; width: 68px; }
  .feed-row .tid { color: var(--steel); font-weight: 700; flex-shrink: 0; width: 60px; }
  .feed-row .type { flex-shrink: 0; width: 90px; font-weight: 700; text-transform: uppercase; font-size: 10.5px; }
  .feed-row .detail { color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .feed-row.type-verdict.pass .type { color: var(--c-done); }
  .feed-row.type-verdict.fail .type { color: var(--c-blocked); }
  .feed-row.type-claim .type { color: var(--ink-soft); }
  .feed-row.type-plan .type { color: var(--steel); }
  .feed-row.type-error .type { color: var(--c-blocked); }
  .feed-row.type-stopped .type { color: var(--c-blocked); }

  .badge-negotiation {
    background: var(--orange);
    color: #fff;
    border-radius: 3px;
    padding: 1px 8px;
    font-weight: 700;
    font-size: 10.5px;
    letter-spacing: 0.04em;
  }

  /* ---------- drawer ---------- */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 25, 30, 0.35);
    display: none;
    z-index: 50;
  }
  .drawer-overlay.open { display: block; }

  .drawer {
    position: fixed;
    top: 0; right: 0;
    width: 420px;
    max-width: 92vw;
    height: 100%;
    background: var(--panel);
    box-shadow: -6px 0 24px rgba(0,0,0,0.2);
    transform: translateX(100%);
    transition: transform 0.18s ease;
    display: flex;
    flex-direction: column;
    z-index: 51;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    background: var(--steel);
    color: #fff;
    padding: 16px 18px;
    flex-shrink: 0;
    position: relative;
  }
  .drawer-header .tid { font-family: Consolas, monospace; font-size: 12px; opacity: 0.85; }
  .drawer-header .title { font-size: 16px; font-weight: 700; margin-top: 4px; }
  .drawer-header .close-btn {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }

  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
  }

  .drawer-body h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 18px 0 8px 0;
  }
  .drawer-body h3:first-child { margin-top: 0; }
  .drawer-body h4 {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--steel);
    margin: 8px 0 3px 0;
  }

  .drawer-body .status-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .status-pill.status-done { background: var(--c-done-bg); color: var(--c-done); }
  .status-pill.status-blocked { background: var(--c-blocked-bg); color: var(--c-blocked); }
  .status-pill.status-in_progress, .status-pill.status-pending_review { background: var(--c-amber-bg); color: #8a6604; }
  .status-pill.status-pending, .status-pill.status-ready { background: var(--c-grey-bg); color: #5a6067; }

  .drawer-body ul { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.6; }
  .drawer-body ul.small { font-size: 12px; line-height: 1.5; }
  .drawer-body p.desc { font-size: 13px; line-height: 1.5; color: var(--ink); }

  .attempt-card {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .attempt-card .attempt-head {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .attempt-card .attempt-head .outcome-success { color: var(--c-done); }
  .attempt-card .attempt-head .outcome-rejected_by_verifier { color: var(--c-blocked); }
  .attempt-card .attempt-head .outcome-crashed,
  .attempt-card .attempt-head .outcome-timeout { color: var(--c-amber); }
  .attempt-card .verdict-text {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.5;
    white-space: pre-wrap;
  }

  .empty-hint { color: var(--ink-soft); font-size: 13px; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c9c2b4; border-radius: 5px; }
</style>

<header>
  <div class="brand"><span class="mark"></span> FOREMAN</div>
  <div class="lang-switch" id="lang-switch">
    <button type="button" id="lang-btn-en" data-lang="en">EN</button>
    <button type="button" id="lang-btn-zh" data-lang="zh">中文</button>
  </div>
  <div class="run-complete-badge" id="complete-badge" data-i18n="allGreen">All Green</div>
  <div class="spacer"></div>
  <div class="clock tabular" id="clock">00:00</div>
</header>

<div class="layout">
  <div class="left-panel">
    <h2 data-i18n="newRun">New Run</h2>
    <div class="field-label" data-i18n="template">Template</div>
    <select id="template-select"><option value="" data-i18n="blankOption">— blank —</option></select>

    <div class="field-label" data-i18n="checklist">Requirements checklist</div>
    <textarea id="checklist" data-i18n-placeholder="checklistPlaceholder" placeholder="1. Build a Flask health-check endpoint.&#10;2. Add a SQLite model...&#10;3. ..."></textarea>

    <div class="model-row">
      <div class="field-label" data-i18n="plannerModel">Planner model</div>
      <select id="model-planner"></select>
      <input type="text" id="model-planner-custom" data-i18n-placeholder="customModelId" placeholder="custom model id" style="display:none;">
    </div>
    <div class="model-row">
      <div class="field-label" data-i18n="executorModel">Executor model</div>
      <select id="model-executor"></select>
      <input type="text" id="model-executor-custom" data-i18n-placeholder="customModelId" placeholder="custom model id" style="display:none;">
    </div>
    <div class="model-row">
      <div class="field-label" data-i18n="verifierModel">Verifier model</div>
      <select id="model-verifier"></select>
      <input type="text" id="model-verifier-custom" data-i18n-placeholder="customModelId" placeholder="custom model id" style="display:none;">
    </div>

    <label class="checkbox-row">
      <input type="checkbox" id="demo-mode-cb">
      <span data-i18n="demoMode">Demo mode — runs without an API key</span>
    </label>
    <div class="hint" id="demo-mode-hint" style="display:none;"></div>

    <button class="start-btn" id="start-btn" data-i18n="startForeman">Start Foreman</button>
    <div class="status-line" id="status-line"></div>

    <hr class="sep">
    <h2 data-i18n="runs">Runs</h2>
    <div class="runs-list" id="runs-list"></div>

    <hr class="sep">

  function detectDefaultLang() {
    try {
      var saved = window.localStorage.getItem("foreman_lang");
      if (saved === "en" || saved === "zh") return saved;
    } catch (err) { /* localStorage unavailable */ }
    var nav = (navigator.language || navigator.userLanguage || "");
    return nav.indexOf("zh") === 0 ? "zh" : "en";
  }

  var currentLang = detectDefaultLang();

  function t(key) {
    var args = Array.prototype.slice.call(arguments, 1);
    var dict = STRINGS[currentLang] || STRINGS.en;
    var str = dict[key];
    if (str === undefined) str = (STRINGS.en[key] !== undefined) ? STRINGS.en[key] : key;
    args.forEach(function (a, i) {
      str = str.replace("{" + i + "}", a);
    });
    return str;
  }

  function statusLabel(status) {
    status = status || "pending";
    var key = "status_" + status;
    var dict = STRINGS[currentLang] || STRINGS.en;
    if (dict[key] !== undefined) return dict[key];
    return status;
  }

  function outcomeLabel(outcome) {
    if (!outcome) return "";
    var key = "outcome_" + outcome;
    var dict = STRINGS[currentLang] || STRINGS.en;
    if (dict[key] !== undefined) return dict[key];
    return outcome.replace(/_/g, " ");
  }

  function setLang(lang) {
    if (lang !== "en" && lang !== "zh") return;
    currentLang = lang;
    try { window.localStorage.setItem("foreman_lang", lang); } catch (err) { /* ignore */ }
    applyStaticTranslations();
    refreshDynamicText();
    var btnEn = document.getElementById("lang-btn-en");
    var btnZh = document.getElementById("lang-btn-zh");
    if (btnEn) btnEn.classList.toggle("active", lang === "en");
    if (btnZh) btnZh.classList.toggle("active", lang === "zh");
  }

  function applyStaticTranslations() {
    Array.prototype.forEach.call(document.querySelectorAll("[data-i18n]"), function (elm) {
      var key = elm.getAttribute("data-i18n");
      elm.textContent = t(key);
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-i18n-placeholder]"), function (elm) {
      var key = elm.getAttribute("data-i18n-placeholder");
      elm.setAttribute("placeholder", t(key));
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-i18n-title]"), function (elm) {
      var key = elm.getAttribute("data-i18n-title");
      elm.setAttribute("title", t(key));
    });
    var wallEl = document.getElementById("wall");
    if (wallEl) wallEl.setAttribute("data-empty-text", t("noRunSelected"));
    var customOptEls = document.querySelectorAll('option[value="__custom__"]');
    Array.prototype.forEach.call(customOptEls, function (opt) { opt.textContent = t("customOption"); });
    var blankOptEls = document.querySelectorAll('#template-select option[value=""]');
    Array.prototype.forEach.call(blankOptEls, function (opt) { opt.textContent = t("blankOption"); });
  }

  // refreshDynamicText is defined further below, after the render functions exist;
  // this forward-declared var is assigned there and invoked here via closure.
  var refreshDynamicText = function () {};

  var KNOWN_MODELS_FALLBACK = ["qwen-max", "qwen-plus", "qwen3-coder-plus", "qwen-turbo", "qwen-flash"];
  var DEFAULTS_FALLBACK = { planner: "qwen-max", executor: "qwen3-coder-plus", verifier: "qwen-plus" };

  var state = {
    runId: null,
    runStartedAt: null,
    eventsAfter: 0,
    detailPollTimer: null,
    runsPollTimer: null,
    clockTimer: null,
    selectedTaskId: null,
    tasksById: {},
    runsCache: [],
    keyPresent: true,
    lastDetail: null,
  };

  var el = {
    clock: document.getElementById("clock"),
    completeBadge: document.getElementById("complete-badge"),

    templateSelect: document.getElementById("template-select"),
    checklist: document.getElementById("checklist"),
    modelPlanner: document.getElementById("model-planner"),
    modelPlannerCustom: document.getElementById("model-planner-custom"),
    modelExecutor: document.getElementById("model-executor"),
    modelExecutorCustom: document.getElementById("model-executor-custom"),
    modelVerifier: document.getElementById("model-verifier"),
    modelVerifierCustom: document.getElementById("model-verifier-custom"),
    demoModeCb: document.getElementById("demo-mode-cb"),
    demoModeHint: document.getElementById("demo-mode-hint"),
    startBtn: document.getElementById("start-btn"),
    statusLine: document.getElementById("status-line"),

    runsList: document.getElementById("runs-list"),

    runHeader: document.getElementById("run-header"),
    rhId: document.getElementById("rh-id"),
    rhChipPlanner: document.getElementById("rh-chip-planner"),
    rhChipExecutor: document.getElementById("rh-chip-executor"),
    rhChipVerifier: document.getElementById("rh-chip-verifier"),
    rhChipMock: document.getElementById("rh-chip-mock"),
    rhCost: document.getElementById("rh-cost"),
    rhClock: document.getElementById("rh-clock"),
    btnStop: document.getElementById("btn-stop"),
    btnResume: document.getElementById("btn-resume"),
    btnDownload: document.getElementById("btn-download"),
    btnArchive: document.getElementById("btn-archive"),

    errorBanner: document.getElementById("error-banner"),
    errorBannerText: document.getElementById("error-banner-text"),
    errorBannerClose: document.getElementById("error-banner-close"),

    wall: document.getElementById("wall"),
    wallCounts: document.getElementById("wall-counts"),
    feedList: document.getElementById("feed-list"),
    drawerOverlay: document.getElementById("drawer-overlay"),
    drawer: document.getElementById("drawer"),
    drawerClose: document.getElementById("drawer-close"),
    drawerTid: document.getElementById("drawer-tid"),
    drawerTitle: document.getElementById("drawer-title"),
    drawerBody: document.getElementById("drawer-body"),
  };

  function fmtElapsed(seconds) {
    seconds = Math.max(0, Math.floor(seconds));
    var h = Math.floor(seconds / 3600);
    var m = Math.floor((seconds % 3600) / 60);
    var s = seconds % 60;
    var pad = function (n) { return (n < 10 ? "0" : "") + n; };
    return h > 0 ? (pad(h) + ":" + pad(m) + ":" + pad(s)) : (pad(m) + ":" + pad(s));
  }

  function fmtClockTime(ts) {
    var d = new Date(ts * 1000);
    var pad = function (n) { return (n < 10 ? "0" : "") + n; };
    return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
  }

  function fmtHHMM(ts) {
    if (!ts) return "--:--";
    var d = new Date(ts * 1000);
    var pad = function (n) { return (n < 10 ? "0" : "") + n; };
    return pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  function fmtUsd(n) {
    if (n === null || n === undefined || isNaN(n)) return null;
    return "$" + Number(n).toFixed(4);
  }

  function fmtTokens(n) {
    if (n === null || n === undefined || isNaN(n)) return "0";
    return Number(n).toLocaleString();
  }

  function escapeHtml(s) {
    if (s === null || s === undefined) return "";
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function api(path, opts) {
    return fetch(path, opts).then(function (r) {
      return r.json().then(function (body) { return { ok: r.ok, status: r.status, body: body }; })
        .catch(function () { return { ok: r.ok, status: r.status, body: {} }; });
    });
  }

  // ---------------- config: templates, models, key ----------------

  function loadConfig() {
    api("/api/config").then(function (res) {
      var cfg = (res.ok && res.body) ? res.body : {};
      state.keyPresent = cfg.key_present !== false; // default true unless explicitly false
      var models = (cfg.models_known && cfg.models_known.length) ? cfg.models_known : KNOWN_MODELS_FALLBACK;
      var defaults = cfg.defaults || DEFAULTS_FALLBACK;
      populateModelSelect(el.modelPlanner, models, defaults.planner || DEFAULTS_FALLBACK.planner);
      populateModelSelect(el.modelExecutor, models, defaults.executor || DEFAULTS_FALLBACK.executor);
      populateModelSelect(el.modelVerifier, models, defaults.verifier || DEFAULTS_FALLBACK.verifier);

      if (!state.keyPresent) {
        el.demoModeCb.checked = true;
        el.demoModeCb.disabled = true;
        el.demoModeHint.style.display = "block";
        el.demoModeHint.textContent = t("noKeyHint");
      } else {
        el.demoModeCb.disabled = false;
        el.demoModeHint.style.display = "none";
      }
    }).catch(function () {
      populateModelSelect(el.modelPlanner, KNOWN_MODELS_FALLBACK, DEFAULTS_FALLBACK.planner);
      populateModelSelect(el.modelExecutor, KNOWN_MODELS_FALLBACK, DEFAULTS_FALLBACK.executor);
      populateModelSelect(el.modelVerifier, KNOWN_MODELS_FALLBACK, DEFAULTS_FALLBACK.verifier);
    });

    api("/api/templates").then(function (res) {
      if (!res.ok || !res.body) return;
      var list = res.body || [];
      el.templateSelect.innerHTML = '<option value="">' + escapeHtml(t("blankOption")) + '</option>';
      list.forEach(function (tpl) {
        var opt = document.createElement("option");
        opt.value = tpl.name;
        opt.textContent = tpl.name;
        opt.setAttribute("data-content", tpl.content || "");
        el.templateSelect.appendChild(opt);
      });
    }).catch(function () {});
  }

  function populateModelSelect(selectEl, models, defaultModel) {
    selectEl.innerHTML = "";
    models.forEach(function (m) {
      var opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m;
      selectEl.appendChild(opt);
    });
    var customOpt = document.createElement("option");
    customOpt.value = "__custom__";
    customOpt.textContent = t("customOption");
    selectEl.appendChild(customOpt);
    if (defaultModel && models.indexOf(defaultModel) !== -1) {
      selectEl.value = defaultModel;
    }
  }

  function wireCustomToggle(selectEl, inputEl) {
    selectEl.addEventListener("change", function () {
      inputEl.style.display = selectEl.value === "__custom__" ? "block" : "none";
    });
  }
  wireCustomToggle(el.modelPlanner, el.modelPlannerCustom);
  wireCustomToggle(el.modelExecutor, el.modelExecutorCustom);
  wireCustomToggle(el.modelVerifier, el.modelVerifierCustom);

  function resolveModelValue(selectEl, inputEl) {
    if (selectEl.value === "__custom__") {
      return (inputEl.value || "").trim();
    }
    return selectEl.value;
  }

  el.templateSelect.addEventListener("change", function () {
    var opt = el.templateSelect.options[el.templateSelect.selectedIndex];
    if (opt && opt.getAttribute("data-content")) {
      el.checklist.value = opt.getAttribute("data-content");
    }
  });

  // ---------------- runs list (sidebar) ----------------

  function statusDotColor(run) {
    var c = run.counts || {};
    if (run.complete && (c.blocked || 0) === 0) return "var(--c-done)";
    if ((c.blocked || 0) > 0) return "var(--c-blocked)";
    if (run.active) return "var(--c-amber)";
    return "var(--c-grey)";
  }

  function refreshRunsList() {
    api("/api/runs").then(function (res) {
      if (!res.ok) return;
      var runs = res.body || [];
      state.runsCache = runs;
      renderRunsList(runs);
    }).catch(function () {});
  }

  function renderRunsList(runs) {
    if (!runs.length) {
      el.runsList.innerHTML = '<div class="runs-empty-hint">' + escapeHtml(t("noRunsYet")) + '</div>';
      return;
    }
    el.runsList.innerHTML = runs.map(function (r) {
      var sel = r.run_id === state.runId ? " selected" : "";
      var cost = (r.est_usd !== null && r.est_usd !== undefined) ? fmtUsd(r.est_usd) : "";
      var mockChip = r.mock ? '<span class="mock-chip" title="' + escapeHtml(t("mockChipTooltip")) + '">' + escapeHtml(t("mockChip")) + '</span>' : "";
      return (
        '<div class="run-row' + sel + '" data-run-id="' + escapeHtml(r.run_id) + '">' +
          '<span class="dot" style="background:' + statusDotColor(r) + '"></span>' +
          '<span class="rid">' + escapeHtml(r.run_id) + '</span>' +
          '<span class="rtime tabular">' + fmtHHMM(r.created_at) + '</span>' +
          mockChip +
          '<span class="rcost tabular">' + escapeHtml(cost) + '</span>' +
        '</div>'
      );
    }).join("");
    Array.prototype.forEach.call(el.runsList.querySelectorAll(".run-row"), function (rowEl) {
      rowEl.addEventListener("click", function () {
        selectRun(rowEl.getAttribute("data-run-id"));
      });
    });
  }

  // ---------------- run selection / polling ----------------

  function selectRun(runId) {
    stopDetailPolling();
    state.runId = runId;
    state.eventsAfter = 0;
    state.runStartedAt = null;
    state.lastDetail = null;
    hideErrorBanner();
    el.feedList.innerHTML = "";
    el.wall.classList.remove("empty");
    el.runHeader.style.display = "flex";
    renderRunsList(state.runsCache);
    loadRunDetail();
    pollEvents();
    state.detailPollTimer = setInterval(function () {
      loadRunDetail();
      pollEvents();
    }, 2000);
  }

  function stopDetailPolling() {
    if (state.detailPollTimer) {
      clearInterval(state.detailPollTimer);
      state.detailPollTimer = null;
    }
  }

  // ---------------- status wall + run header ----------------

  function loadRunDetail() {
    if (!state.runId) return;
    api("/api/runs/" + encodeURIComponent(state.runId)).then(function (res) {
      if (!res.ok) return;
      state.lastDetail = res.body;
      renderWall(res.body);
      renderRunHeader(res.body);
    }).catch(function () {});
  }

  function renderRunHeader(detail) {
    detail = detail || {};
    el.rhId.textContent = detail.run_id || state.runId || "";

    var config = detail.config || null;
    var models = (config && config.models) || {};
    el.rhChipPlanner.textContent = t("chipPlanner", models.planner || "?");
    el.rhChipExecutor.textContent = t("chipExecutor", models.executor || "?");
    el.rhChipVerifier.textContent = t("chipVerifier", models.verifier || "?");

    var isMock = !!(config && config.mock);
    el.rhChipMock.style.display = isMock ? "inline-block" : "none";

    var usage = detail.usage || null;
    var estUsd = (detail.est_usd !== undefined && detail.est_usd !== null) ? detail.est_usd
      : (config && config.est_usd !== undefined ? config.est_usd : null);
    var totalTok = 0;
    if (usage && usage.totals) {
      totalTok = (usage.totals.prompt_tokens || 0) + (usage.totals.completion_tokens || 0);
    }
    var costStr = (estUsd !== null && estUsd !== undefined) ? "≈" + fmtUsd(estUsd).replace("$", "$") : "≈$0.0000";
    el.rhCost.textContent = costStr + " · " + fmtTokens(totalTok) + " " + t("tok");

    var active = !!detail.active;
    var complete = !!detail.complete;
    var isMockRun = isMock;

    el.btnStop.style.display = active ? "inline-block" : "none";
    el.btnResume.style.display = (!active && !complete && !isMockRun) ? "inline-block" : "none";
    el.btnDownload.style.display = "inline-block";
    el.btnArchive.style.display = active ? "none" : "inline-block";

    if (state.runStartedAt === null && detail.created_at) {
      state.runStartedAt = detail.created_at;
    }

    // surface a friendly error, if any, was already handled via events; nothing else here.
  }

  function renderWall(detail) {
    var tasks = detail.tasks || [];
    state.tasksById = {};
    tasks.forEach(function (task) { state.tasksById[task.task_id] = task; });

    el.completeBadge.classList.toggle("show", !!detail.complete);

    var c = detail.counts || {};
    el.wallCounts.textContent =
      t("countDone") + " " + (c.done || 0) + " / " + t("countBlocked") + " " + (c.blocked || 0) +
      " / " + t("countInProgress") + " " + (c.in_progress || 0) + " / " + t("countReview") + " " + (c.pending_review || 0) +
      " / " + t("countReady") + " " + (c.ready || 0) + " / " + t("countPending") + " " + (c.pending || 0) +
      "  (" + tasks.length + " " + t("countTotal") + ")";

    if (tasks.length === 0) {
      el.wall.classList.add("empty");
      el.wall.innerHTML = "";
      return;
    }
    el.wall.classList.remove("empty");

    el.wall.innerHTML = tasks.map(function (task) {
      var selected = task.task_id === state.selectedTaskId ? " selected" : "";
      var status = task.status || "pending";
      return (
        '<div class="cell status-' + escapeHtml(status) + selected + '" data-task-id="' + escapeHtml(task.task_id) + '" title="' + escapeHtml(task.title || "") + '">' +
          '<div class="tid">' + escapeHtml(task.task_id) + '</div>' +
          '<div class="title">' + escapeHtml(task.title || t("untitled")) + '</div>' +
          '<div class="meta">' + escapeHtml(statusLabel(status)) + (task.attempt_count ? " &middot; " + escapeHtml(t("attemptShort", task.attempt_count)) : "") + '</div>' +
        '</div>'
      );
    }).join("");

    Array.prototype.forEach.call(el.wall.querySelectorAll(".cell"), function (cellEl) {
      cellEl.addEventListener("click", function () {
        openDrawer(cellEl.getAttribute("data-task-id"));
      });
    });
  }

  // ---------------- event feed ----------------

  function pollEvents() {
    if (!state.runId) return;
    api("/api/runs/" + encodeURIComponent(state.runId) + "/events?after=" + state.eventsAfter).then(function (res) {
      if (!res.ok) return;
      var body = res.body || {};
      if (body.events && body.events.length) {
        appendFeedEvents(body.events);
        checkForErrorEvents(body.events);
      }
      if (body.next !== undefined) state.eventsAfter = body.next;
    }).catch(function () {});
  }

  function checkForErrorEvents(events) {
    events.forEach(function (e) {
      if (e.type === "error") {
        var d = e.detail || {};
        var msg = d.friendly || d.message || d.error || t("genericRunError");
        showErrorBanner(msg);
      }
      if (e.type === "stopped") {
        showErrorBanner(t("runStoppedByUser"));
      }
    });
  }

  function showErrorBanner(msg) {
    el.errorBannerText.textContent = msg;
    el.errorBanner.classList.add("show");
  }
  function hideErrorBanner() {
    el.errorBanner.classList.remove("show");
    el.errorBannerText.textContent = "";
  }
  el.errorBannerClose.addEventListener("click", hideErrorBanner);

  function appendFeedEvents(events) {
    var frag = document.createDocumentFragment();
    events.forEach(function (e) {
      var row = document.createElement("div");
      var isNegotiation = e.type === "dispute" || e.type === "arbitration";
      var passClass = "";
      if (e.type === "verdict" && e.detail) {
        passClass = e.detail.passed ? "pass" : "fail";
      }
      row.className = "feed-row type-" + escapeHtml(e.type || "unknown") + (passClass ? " " + passClass : "");

      var detailText = summarizeDetail(e);
      row.innerHTML =
        '<span class="ts tabular">' + fmtClockTime(e.ts) + '</span>' +
        '<span class="tid">' + escapeHtml(e.task_id || "") + '</span>' +
        '<span class="type">' + (isNegotiation ? '<span class="badge-negotiation">' + escapeHtml((e.type || "").toUpperCase()) + '</span>' : escapeHtml(e.type || "")) + '</span>' +
        '<span class="detail" title="' + escapeHtml(detailText) + '">' + escapeHtml(detailText) + '</span>';
      frag.appendChild(row);
    });
    el.feedList.appendChild(frag);
    el.feedList.scrollTop = el.feedList.scrollHeight;
  }

  function summarizeDetail(e) {
    var d = e.detail || {};
    if (e.type === "verdict") {
      return d.passed ? t("feedPass", d.new_status || "", d.reason || "") : t("feedReject", d.new_status || "", d.reason || "");
    }
    if (e.type === "plan") {
      return t("feedPlan", (d.n_tasks !== undefined ? d.n_tasks : "?"), (d.task_ids || []).join(", "));
    }
    if (e.type === "claim") {
      return t("feedClaim", d.attempt || "?");
    }
    if (e.type === "submit") {
      return t("feedSubmit", d.outcome || "");
    }
    if (e.type === "dispute") {
      return d.rebuttal || safeJson(d);
    }
    if (e.type === "arbitration") {
      return t("feedArbitration", d.ruling || "", d.reasoning || "");
    }
    if (e.type === "error") {
      return d.friendly || d.message || d.error || safeJson(d);
    }
    if (e.type === "stopped") {
      return t("feedStopSentinel");
    }
    return safeJson(d);
  }

  function safeJson(d) {
    try { return JSON.stringify(d); } catch (err) { return String(d); }
  }

  // ---------------- drawer ----------------

  function openDrawer(taskId) {
    if (!taskId || !state.runId) return;
    state.selectedTaskId = taskId;
    Array.prototype.forEach.call(el.wall.querySelectorAll(".cell"), function (c) {
      c.classList.toggle("selected", c.getAttribute("data-task-id") === taskId);
    });

    api("/api/runs/" + encodeURIComponent(state.runId) + "/task/" + encodeURIComponent(taskId)).then(function (res) {
      if (!res.ok) return;
      renderDrawer(res.body || {});
      el.drawer.classList.add("open");
      el.drawerOverlay.classList.add("open");
    }).catch(function () {});
  }

  function closeDrawer() {
    el.drawer.classList.remove("open");
    el.drawerOverlay.classList.remove("open");
    state.selectedTaskId = null;
    Array.prototype.forEach.call(el.wall.querySelectorAll(".cell"), function (c) {
      c.classList.remove("selected");
    });
  }

  el.drawerClose.addEventListener("click", closeDrawer);
  el.drawerOverlay.addEventListener("click", closeDrawer);

  function renderDrawer(task) {
    el.drawerTid.textContent = task.task_id || "";
    el.drawerTitle.textContent = task.title || "";

    var html = "";
    html += '<span class="status-pill status-' + escapeHtml(task.status || "pending") + '">' + escapeHtml(statusLabel(task.status)) + '</span>';

    html += '<h3>' + escapeHtml(t("drawerDescription")) + '</h3><p class="desc">' + escapeHtml(task.description || "") + '</p>';

    html += '<h3>' + escapeHtml(t("drawerAcceptanceCriteria")) + '</h3>';
    if (task.acceptance_criteria && task.acceptance_criteria.length) {
      html += '<ul>' + task.acceptance_criteria.map(function (c) { return '<li>' + escapeHtml(c) + '</li>'; }).join("") + '</ul>';
    } else {
      html += '<p class="empty-hint">' + escapeHtml(t("drawerNoneRecorded")) + '</p>';
    }

    if (task.last_error) {
      html += '<h3>' + escapeHtml(t("drawerLatestFeedback")) + '</h3><p class="desc">' + escapeHtml(task.last_error) + '</p>';
    }

    html += '<h3>' + escapeHtml(t("drawerAttemptHistory", task.attempts ? task.attempts.length : 0)) + '</h3>';
    if (task.attempts && task.attempts.length) {
      html += task.attempts.slice().reverse().map(renderAttemptCard).join("");
    } else {
      html += '<p class="empty-hint">' + escapeHtml(t("drawerNoAttempts")) + '</p>';
    }

    el.drawerBody.innerHTML = html;
  }

  function renderAttemptCard(a) {
    var out = '<div class="attempt-card">' +
      '<div class="attempt-head"><span>' + escapeHtml(t("drawerAttempt", a.attempt_no)) + '</span>' +
      '<span class="outcome-' + escapeHtml(a.outcome || "") + '">' + escapeHtml(outcomeLabel(a.outcome)) + '</span></div>';

    if (a.verdict) {
      out += '<div class="verdict-text">' + escapeHtml(a.verdict) + '</div>';
    }

    out += renderHandoffPretty(a.handoff);

    out += '</div>';
    return out;
  }

  function renderHandoffPretty(handoff) {
    if (!handoff) return "";
    var parsed = null;

    // handoff may already be an object (webui_data.py parses summary JSON server-side),
    // or it may be a raw string that needs parsing here. Handle both defensively.
    if (typeof handoff === "object") {
      parsed = handoff;
    } else if (typeof handoff === "string") {
      try {
        parsed = JSON.parse(handoff);
      } catch (err) {
        parsed = null;
      }
    }

    if (!parsed || typeof parsed !== "object") {
      if (typeof handoff === "string" && handoff.trim()) {
        return '<div class="verdict-text">' + escapeHtml(handoff) + '</div>';
      }
      return "";
    }

    var out = "";
    out += renderHandoffList(parsed.completed_work, t("drawerCompletedWork"));
    out += renderHandoffList(parsed.files_touched, t("drawerFilesTouched"));
    out += renderHandoffList(parsed.gotchas, t("drawerGotchas"));

    // Fall back to raw text if none of the expected fields were present/usable.
    if (!out) {
      var raw = "";
      try { raw = JSON.stringify(parsed); } catch (err) { raw = String(parsed); }
      if (raw && raw !== "{}") {
        out = '<div class="verdict-text">' + escapeHtml(raw) + '</div>';
      }
    }
    return out;
  }

  function renderHandoffList(items, label) {
    if (!items || !items.length) return "";
    return '<h4>' + escapeHtml(label) + '</h4><ul class="small">' +
      items.map(function (it) { return '<li>' + escapeHtml(it) + '</li>'; }).join("") +
      '</ul>';
  }

  // ---------------- run header buttons ----------------

  el.btnStop.addEventListener("click", function () {
    if (!state.runId) return;
    el.btnStop.disabled = true;
    api("/api/runs/" + encodeURIComponent(state.runId) + "/stop", { method: "POST" }).then(function () {
      el.btnStop.disabled = false;
      loadRunDetail();
      refreshRunsList();
    }).catch(function () { el.btnStop.disabled = false; });
  });

  el.btnResume.addEventListener("click", function () {
    if (!state.runId) return;
    el.btnResume.disabled = true;
    api("/api/runs/" + encodeURIComponent(state.runId) + "/resume", { method: "POST" }).then(function (res) {
      el.btnResume.disabled = false;
      if (!res.ok) {
        showErrorBanner((res.body && (res.body.error || res.body.friendly)) || t("resumeFailed", res.status));
        return;
      }
      loadRunDetail();
      refreshRunsList();
    }).catch(function () { el.btnResume.disabled = false; });
  });

  el.btnDownload.addEventListener("click", function () {
    if (!state.runId) return;
    window.open("/api/runs/" + encodeURIComponent(state.runId) + "/download", "_blank");
  });

  el.btnArchive.addEventListener("click", function () {
    if (!state.runId) return;
    if (!window.confirm(t("archiveConfirm"))) return;
    api("/api/runs/" + encodeURIComponent(state.runId), { method: "DELETE" }).then(function (res) {
      if (!res.ok) {
        showErrorBanner((res.body && res.body.error) || t("archiveFailed", res.status));
        return;
      }
      stopDetailPolling();
      state.runId = null;
      el.runHeader.style.display = "none";
      el.wall.classList.add("empty");
      el.wall.innerHTML = "";
      el.wallCounts.textContent = "";
      el.feedList.innerHTML = "";
      el.completeBadge.classList.remove("show");
      hideErrorBanner();
      refreshRunsList();
    }).catch(function () {});
  });

  // ---------------- start run ----------------

  el.startBtn.addEventListener("click", function () {
    var requirements = el.checklist.value.trim();
    if (!requirements) {
      el.statusLine.textContent = t("typeRequirementsFirst");
      el.statusLine.classList.add("error");
      return;
    }
    el.startBtn.disabled = true;
    el.statusLine.classList.remove("error");
    el.statusLine.textContent = t("startingForeman");

    var body = { requirements: requirements };
    var models = {};
    var pv = resolveModelValue(el.modelPlanner, el.modelPlannerCustom);
    var ev = resolveModelValue(el.modelExecutor, el.modelExecutorCustom);
    var vv = resolveModelValue(el.modelVerifier, el.modelVerifierCustom);
    if (pv) models.planner = pv;
    if (ev) models.executor = ev;
    if (vv) models.verifier = vv;
    if (Object.keys(models).length) body.models = models;
    body.mock = !!el.demoModeCb.checked;

    api("/api/runs", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    }).then(function (res) {
      el.startBtn.disabled = false;
      if (!res.ok) {
        el.statusLine.classList.add("error");
        el.statusLine.textContent = (res.body && (res.body.error || res.body.friendly)) || t("httpError", res.status);
        return;
      }
      el.statusLine.classList.remove("error");
      el.statusLine.textContent = t("runStarted", res.body.run_id);
      refreshRunsList();
      selectRun(res.body.run_id);
    }).catch(function (err) {
      el.startBtn.disabled = false;
      el.statusLine.classList.add("error");
      el.statusLine.textContent = t("requestFailed", err);
    });
  });

  // ---------------- clocks ----------------

  function tickClock() {
    if (state.runStartedAt) {
      var elapsed = (Date.now() / 1000) - state.runStartedAt;
      var s = fmtElapsed(elapsed);
      el.clock.textContent = s;
      el.rhClock.textContent = s;
    } else {
      el.clock.textContent = "00:00";
      el.rhClock.textContent = "00:00";
    }
  }
  state.clockTimer = setInterval(tickClock, 1000);

  // ---------------- language switch wiring ----------------

  refreshDynamicText = function () {
    // Re-render everything currently on screen so it reflects the new language.
    renderRunsList(state.runsCache);
    if (state.lastDetail) {
      renderWall(state.lastDetail);
      renderRunHeader(state.lastDetail);
    }
    if (state.selectedTaskId && el.drawer.classList.contains("open")) {
      openDrawer(state.selectedTaskId);
    }
    if (!state.keyPresent && el.demoModeHint.style.display !== "none") {
      el.demoModeHint.textContent = t("noKeyHint");
    }
  };

  var langBtnEn = document.getElementById("lang-btn-en");
  var langBtnZh = document.getElementById("lang-btn-zh");
  if (langBtnEn) langBtnEn.addEventListener("click", function () { setLang("en"); });
  if (langBtnZh) langBtnZh.addEventListener("click", function () { setLang("zh"); });

  // ---------------- boot ----------------

  setLang(currentLang);
  loadConfig();
  refreshRunsList();
  state.runsPollTimer = setInterval(refreshRunsList, 3000);
})();
</script>
